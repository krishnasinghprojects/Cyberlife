<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Cyberlife Hub — Central control panel for all connected devices and AI inference">
    <title>Cyberlife Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/@xterm/xterm/css/xterm.css" />
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="app">

        <!-- ── HEADER ─────────────────────────────────────────────────────── -->
        <header class="hub-header">

            <div class="header-brand">
                <svg class="logo-hex" viewBox="0 0 44 50" fill="none">
                    <path d="M22 1L42 12.5V37.5L22 49L2 37.5V12.5L22 1Z"
                          stroke="rgba(220,20,60,0.55)" stroke-width="1.5"
                          fill="rgba(220,20,60,0.07)"/>
                    <circle cx="22" cy="25" r="5.5" fill="#dc143c" opacity="0.9"/>
                    <line x1="22" y1="10" x2="22" y2="17" stroke="#dc143c" stroke-width="1.5" opacity="0.4"/>
                    <line x1="22" y1="33" x2="22" y2="40" stroke="#dc143c" stroke-width="1.5" opacity="0.4"/>
                    <line x1="10" y1="17.5" x2="15.5" y2="20.5" stroke="#dc143c" stroke-width="1.5" opacity="0.4"/>
                    <line x1="28.5" y1="29.5" x2="34" y2="32.5" stroke="#dc143c" stroke-width="1.5" opacity="0.4"/>
                    <line x1="10" y1="32.5" x2="15.5" y2="29.5" stroke="#dc143c" stroke-width="1.5" opacity="0.4"/>
                    <line x1="28.5" y1="20.5" x2="34" y2="17.5" stroke="#dc143c" stroke-width="1.5" opacity="0.4"/>
                </svg>
                <div class="brand-text">
                    <h1 class="hub-title">Cyberlife Hub</h1>
                    <div class="conn-status">
                        <span class="conn-dot" id="conn-dot"></span>
                        <span id="conn-label">Connecting…</span>
                    </div>
                </div>
            </div>

            <!-- Mode Toggle -->
            <div class="mode-toggle" role="tablist" aria-label="View mode">
                <button class="mode-btn active" id="btn-monitor"
                        role="tab" aria-selected="true" aria-controls="view-monitoring">
                    <i data-lucide="activity"></i>
                </button>
                <button class="mode-btn" id="btn-chat"
                        role="tab" aria-selected="false" aria-controls="view-chat">
                    <i data-lucide="message-square"></i>
                </button>
                <button class="mode-btn" id="btn-ssh"
                        role="tab" aria-selected="false" aria-controls="view-ssh">
                    <i data-lucide="terminal-square"></i>
                </button>
                <button class="mode-btn" id="btn-docker"
                        role="tab" aria-selected="false" aria-controls="view-docker">
                    <i data-lucide="box"></i>
                </button>
                <button class="mode-btn" id="btn-vnc"
                        role="tab" aria-selected="false" aria-controls="view-vnc">
                    <i data-lucide="monitor-play"></i>
                </button>
            </div>

            <!-- Stats -->
            <div class="header-stats">
                <button class="theme-toggle-btn" id="btn-theme" title="Toggle theme" aria-label="Toggle light/dark mode">
                    <i data-lucide="sun" id="theme-icon"></i>
                </button>
                <div class="stat-pill">
                    <i data-lucide="server" class="pill-icon"></i>
                    <span class="pill-val" id="count-total">0</span>
                    <span class="pill-lbl">Devices</span>
                </div>
                <div class="stat-pill pill-online">
                    <i data-lucide="wifi" class="pill-icon"></i>
                    <span class="pill-val" id="count-online">0</span>
                    <span class="pill-lbl">Online</span>
                </div>
                <div class="stat-pill pill-time">
                    <span class="pill-val" id="clock">--:--</span>
                    <span class="pill-lbl" id="dateline">---</span>
                </div>
            </div>

        </header>

        <!-- ── MAIN ───────────────────────────────────────────────────────── -->
        <main class="main-content">

            <!-- MONITORING VIEW -->
            <div class="view monitoring-view" id="view-monitoring" role="tabpanel">
                <div id="devices-grid" class="devices-grid">
                    <div class="empty-state" id="empty-state">
                        <svg class="empty-ring" viewBox="0 0 100 100">
                            <circle cx="50" cy="50" r="40"
                                    stroke="rgba(220,20,60,0.15)" stroke-width="1.5"
                                    fill="none" stroke-dasharray="6 4"/>
                            <circle cx="50" cy="50" r="26"
                                    stroke="rgba(220,20,60,0.08)" stroke-width="1"
                                    fill="none" stroke-dasharray="3 5"/>
                            <circle cx="50" cy="50" r="6" fill="rgba(220,20,60,0.25)"/>
                            <circle cx="50" cy="50" r="3" fill="rgba(220,20,60,0.7)"/>
                        </svg>
                        <p class="empty-title">Waiting for devices</p>
                        <span class="empty-sub">Devices will appear here once they register with the hub</span>
                    </div>
                </div>
            </div>

            <!-- CHAT VIEW -->
            <div class="view chat-view hidden" id="view-chat" role="tabpanel">
                
                <!-- Chat Sidebar (Past Sessions) -->
                <div class="chat-sidebar collapsed" id="chat-sidebar" aria-label="Chat History">
                    <div class="sidebar-header">
                        <h3>Chats</h3>
                        <button class="toolbar-btn primary" id="btn-new-chat" aria-label="New Chat" title="New Chat">
                            <i data-lucide="plus"></i>
                        </button>
                    </div>
                    <div class="sidebar-session-list" id="sidebar-sessions">
                        <!-- Sessions load here -->
                    </div>
                </div>

                <!-- Mobile Overlay -->
                <div class="chat-sidebar-overlay" id="chat-sidebar-overlay"></div>

                <div class="chat-main">
                    <!-- Toolbar -->
                    <div class="chat-toolbar">
                        <div class="toolbar-group">
                            <button class="toolbar-btn" id="btn-toggle-sidebar" aria-label="Toggle Sidebar" style="margin-right: 8px;">
                                <i data-lucide="panel-left"></i>
                            </button>
                            <label class="toolbar-label" for="ai-device-select">Node</label>
                            <select class="toolbar-select" id="ai-device-select">
                                <option value="">No AI devices</option>
                            </select>
                        </div>
                        <div class="toolbar-group">
                            <label class="toolbar-label" for="model-select">Model</label>
                            <select class="toolbar-select" id="model-select">
                                <option value="">Select node first</option>
                            </select>
                        </div>
                        <div class="toolbar-actions">
                            <button class="toolbar-btn toolbar-btn-danger" id="btn-clear-history" title="Clear history on server">
                                <i data-lucide="trash-2"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Messages -->
                    <div class="chat-messages" id="chat-messages">
                        <div class="chat-welcome" id="chat-welcome">
                            <i data-lucide="brain" class="welcome-icon"></i>
                            <p class="welcome-title">Cyberlife AI</p>
                            <span class="welcome-sub">Ollama-powered inference via MacBook Pro node</span>
                            <span class="welcome-hint">Select a node and model above to begin</span>
                        </div>
                    </div>

                    <!-- Input Bar -->
                    <div class="chat-input-bar">
                        <input class="chat-input" id="chat-input"
                               type="text" placeholder="Ask anything…"
                               autocomplete="off" spellcheck="false"
                               aria-label="Chat message"/>
                        <button class="chat-send-btn" id="chat-send" aria-label="Send message">
                            <i data-lucide="send"></i>
                        </button>
                    </div>
                </div> <!-- End Chat Main -->
            </div>

            <!-- SSH VIEW -->
            <div class="view ssh-view hidden" id="view-ssh" role="tabpanel">
                <div class="chat-toolbar ssh-toolbar">
                    <div class="toolbar-group">
                        <label class="toolbar-label" for="ssh-device-select">Host</label>
                        <select class="toolbar-select" id="ssh-device-select">
                            <option value="">Custom IP</option>
                        </select>
                        <input class="chat-input ssh-input" id="ssh-host-input" type="text" placeholder="192.168.1.x" />
                    </div>
                    <div class="toolbar-group">
                        <label class="toolbar-label" for="ssh-user">User</label>
                        <input class="chat-input ssh-input" id="ssh-user" type="text" placeholder="root" />
                    </div>
                    <div class="toolbar-group">
                        <label class="toolbar-label" for="ssh-pass">Pass</label>
                        <input class="chat-input ssh-input" id="ssh-pass" type="password" placeholder="••••••••" />
                    </div>
                    <div class="toolbar-actions">
                        <button class="toolbar-btn" id="btn-ssh-connect" title="Connect via SSH">
                            <i data-lucide="plug"></i>
                            <span class="btn-label" id="ssh-connect-label">Connect</span>
                        </button>
                    </div>
                </div>

                <div class="ssh-terminal-container" id="terminal-container"></div>
            </div>

            <!-- DOCKER VIEW -->
            <div class="view docker-view hidden" id="view-docker" role="tabpanel">
                <div class="docker-toolbar">
                    <button class="toolbar-btn" id="btn-docker-refresh" title="Refresh Containers">
                        <i data-lucide="refresh-cw"></i>
                        <span class="btn-label">Refresh</span>
                    </button>
                </div>
                <div class="docker-grid" id="docker-grid">
                    <!-- Cards will be injected here -->
                </div>
            </div>

            <!-- VNC VIEW -->
            <div class="view vnc-view hidden" id="view-vnc" role="tabpanel">
                <div class="chat-toolbar vnc-toolbar">
                    <div class="toolbar-group">
                        <label class="toolbar-label" for="vnc-device-select">Host</label>
                        <select class="toolbar-select" id="vnc-device-select">
                            <option value="">Select Host</option>
                        </select>
                        <input class="chat-input vnc-input" id="vnc-host-input" type="text" placeholder="IP Address" readonly />
                    </div>
                    <div class="toolbar-group">
                        <label class="toolbar-label" for="vnc-pass">Pass</label>
                        <input class="chat-input vnc-input" id="vnc-pass" type="password" placeholder="Password" />
                    </div>
                    <div class="toolbar-actions">
                        <button class="toolbar-btn" id="btn-vnc-connect" title="Connect via VNC">
                            <i data-lucide="monitor-play"></i>
                            <span class="btn-label" id="vnc-connect-label">Connect</span>
                        </button>
                        <button class="toolbar-btn" id="btn-vnc-fullscreen" title="Full Screen" style="display:none; margin-left: 8px;">
                            <i data-lucide="maximize"></i>
                        </button>
                    </div>
                </div>

                <div class="vnc-container" id="vnc-container">
                    <div class="vnc-empty-state">
                        <i data-lucide="monitor-off"></i>
                        <p style="text-align: center;">No active VNC connection.</p>
                    </div>
                </div>
            </div>

        </main>

    </div>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="https://unpkg.com/@xterm/xterm/lib/xterm.js"></script>
    <script src="https://unpkg.com/@xterm/addon-fit/lib/addon-fit.js"></script>
    <!-- Markdown parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- noVNC ES module -->
    <script type="module">
        import RFB from './novnc/core/rfb.js';
        window.RFB = RFB;
    </script>
    <script src="app.js"></script>

</body>

</html>
